<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>SignalR Chat Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
</head>
<body>
    <h2>SignalR Chat Test</h2>

    <div>
        Username: <input id="username" value="user1" />
        RoomId: <input id="roomId" value="11111111-1111-1111-1111-111111111111" style="width:300px"/>
        <button onclick="connect()">Connect</button>
    </div>

    <hr/>

    <div>
        Message: <input id="messageInput" style="width:300px"/>
        <button onclick="sendMessage()">Send</button>
    </div>

    <ul id="messages"></ul>

<script>
let connection;
let roomId;

async function connect() {
    const username = document.getElementById("username").value;
    roomId = document.getElementById("roomId").value;

    connection = new signalR.HubConnectionBuilder()
        .withUrl("/chatHub?username=" + encodeURIComponent(username))
        .build();

    connection.on("ReceiveMessage", function(id, room, sender, content, timestamp) {
        const li = document.createElement("li");
        li.textContent = timestamp + " | " + sender + ": " + content;
        document.getElementById("messages").appendChild(li);
    });

    await connection.start();
    await connection.invoke("JoinRoom", roomId);

    console.log("Connected");
}

async function sendMessage() {
    const msg = document.getElementById("messageInput").value;
    await connection.invoke("SendMessage", roomId, msg);
}
</script>
</body>
</html>

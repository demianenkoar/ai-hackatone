version: "3.9"

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "Password123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
    ports:
      - "58097:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=master;User Id=sa;Password=Password123!;TrustServerCertificate=True;Encrypt=False"

  client:
    build:
      context: ./client-app
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ./client-app:/app
      - /app/node_modules
    command: npm run dev -- --host
    ports:
      - "5173:5173"
    depends_on:
      - app

volumes:
  sql_data:
